name: Update F&B tickers

# SET trading hours: 10:00-12:30 + 14:30-16:30 ICT (Mon-Fri)
# = 03:00-05:30 + 07:30-09:30 UTC
# Runs every 15 min during those windows, plus one snapshot at market open / close.
on:
  schedule:
    - cron: '*/15 3-9 * * 1-5'
  workflow_dispatch:        # allow manual trigger from the Actions tab

permissions:
  contents: write           # required to push the updated tickers.json

concurrency:
  group: update-tickers
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install deps
        run: npm ci

      - name: Fetch tickers
        run: node scripts/update-tickers.mjs

      - name: Commit & push
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'chore(tickers): update F&B prices [skip ci]'
          file_pattern: 'public/tickers.json'
          commit_user_name: 'tickers-bot'
          commit_user_email: 'tickers-bot@users.noreply.github.com'
